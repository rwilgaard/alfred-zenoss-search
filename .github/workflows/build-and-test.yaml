name: Build and Test

on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
      - '!.gitignore'
      - '!LICENSE'
      - '!*.md'

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Run vet
        run: make vet

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      matrix:
        os: [macos-26, ubuntu-24.04]
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Create universal binary
        if: ${{ matrix.os != 'ubuntu-24.04' }}
        run: |
          make universal-binary

  ci:
    name: CI
    runs-on: ubuntu-24.04
    needs: [lint, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
